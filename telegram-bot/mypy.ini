# Local mypy configuration — use from telegram-bot root:
#   python -m mypy .
#
[mypy]
python_version = 3.12
explicit_package_bases = True
namespace_packages = True
mypy_path = .

# Third-party libs without stubs
[mypy-telegram.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-asyncpg]
ignore_missing_imports = True

[mypy-psycopg2]
ignore_missing_imports = True

# Large handler modules: SQLAlchemy Column vs int, optional Telegram updates, user_data dicts
[mypy-bot.handlers.mentions]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-bot.handlers.menus]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-bot.commands.constraints]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined, misc

[mypy-bot.commands.event_creation]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined, misc, operator

# coordination_engine: Telegram types, context.bot_data, query.message are inherently dynamic
[mypy-coordination_engine.main]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.presentation.mention_handler]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.presentation.command_handlers]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.presentation.event_flow_handler]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.infrastructure.telegram_adapter]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.infrastructure.persistence]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.bootstrap]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

# coordination_engine application: IEventStore UoW protocol, domain event id types
[mypy-coordination_engine.application.commands]
disable_error_code = attr-defined, arg-type

[mypy-coordination_engine.application.services]
disable_error_code = arg-type

# ai/ legacy: SQLAlchemy Column types
[mypy-ai.*]
disable_error_code = union-attr, arg-type, type-var, misc, call-arg, var-annotated

# db/models: SQLAlchemy Column types
[mypy-db.models]
disable_error_code = var-annotated, union-attr

# Utility scripts
[mypy-add_column_direct]
ignore_missing_imports = True

[mypy-scripts.*]
ignore_missing_imports = True

[mypy-check_column]
ignore_missing_imports = True

[mypy-check_v35_compliance]
ignore_missing_imports = True

[mypy-add_admin_column]
ignore_missing_imports = True

[mypy-test_setup]
ignore_missing_imports = True

# bot services: SQLAlchemy Column vs runtime values, optional Telegram types
[mypy-bot.services.participant_service]
disable_error_code = assignment, arg-type, union-attr, attr-defined

[mypy-bot.services.organizer_rotation_service]
disable_error_code = assignment, arg-type, union-attr

[mypy-bot.services.idempotency_service]
disable_error_code = assignment, arg-type, union-attr, attr-defined, return-value

[mypy-bot.services.group_event_type_stats_service]
disable_error_code = assignment, arg-type

[mypy-bot.services.event_state_transition_service]
disable_error_code = assignment, arg-type, union-attr, call-arg

[mypy-bot.services.event_enrichment_service]
disable_error_code = assignment, arg-type, attr-defined

[mypy-bot.services.waitlist_service]
disable_error_code = assignment, arg-type, union-attr, return-value

[mypy-bot.services.event_memory_service]
disable_error_code = assignment, arg-type, union-attr, attr-defined

[mypy-bot.services.event_materialization_service]
disable_error_code = assignment, arg-type, union-attr, type-var, return-value

[mypy-bot.services.event_lifecycle_service]
disable_error_code = assignment, arg-type, union-attr

[mypy-bot.services.live_card_service]
disable_error_code = assignment, arg-type, union-attr, call-overload, return-value

[mypy-bot.services.mosaic_assembly_service]
disable_error_code = assignment, arg-type, union-attr, var-annotated

# bot commands: SQLAlchemy Column vs runtime values, optional Telegram types
[mypy-bot.commands.preferences]
disable_error_code = assignment, arg-type, union-attr, var-annotated

[mypy-bot.commands.my_history]
disable_error_code = union-attr

[mypy-bot.commands.my_groups]
disable_error_code = arg-type

[mypy-bot.commands.memory]
disable_error_code = union-attr, arg-type, assignment, used-before-def, var-annotated, operator, attr-defined

[mypy-bot.commands.modify_event]
disable_error_code = assignment, arg-type, union-attr, var-annotated, call-overload, operator

[mypy-bot.commands.request_confirmations]
disable_error_code = assignment, arg-type, union-attr, type-var, call-overload, return-value

[mypy-bot.commands.event_details]
disable_error_code = assignment, arg-type, union-attr

[mypy-bot.commands.cancel]
disable_error_code = union-attr, arg-type

[mypy-bot.commands.back]
disable_error_code = union-attr, arg-type

# bot handlers: SQLAlchemy Column vs runtime values, optional Telegram types
[mypy-bot.handlers.event_panel]
disable_error_code = assignment, arg-type, union-attr, attr-defined, index, call-overload, return-value, operator

[mypy-bot.handlers.event_flow]
disable_error_code = union-attr, arg-type, assignment, operator, call-overload

# bot common: SQLAlchemy Column vs runtime values
[mypy-bot.common.scheduling]
disable_error_code = arg-type

[mypy-bot.common.callback_protection]
disable_error_code = assignment, arg-type, union-attr, index

[mypy-bot.common.user_preferences]
disable_error_code = assignment, arg-type, union-attr, var-annotated, misc

[mypy-bot.common.rbac]
disable_error_code = assignment, arg-type, union-attr, attr-defined, var-annotated

[mypy-bot.common.webhook]
disable_error_code = func-returns-value

[mypy-bot.common.event_notifications]
disable_error_code = arg-type

[mypy-bot.common.menus]
disable_error_code = assignment

[mypy-bot.common.rate_limiter]
disable_error_code = arg-type

[mypy-bot.common.weekly_digest]
disable_error_code = arg-type

[mypy-bot.common.scheduler]
disable_error_code = arg-type, var-annotated

# main module
[mypy-main]
disable_error_code = union-attr, arg-type, assignment, attr-defined
